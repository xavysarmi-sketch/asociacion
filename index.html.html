<style>
:root{--bg:#F5F0EB;--card:#fff;--accent:#2D6A4F;--dark:#1B4332;--warm:#E07A3A;--warm-lt:#FFF0E6;--text:#2C2C2C;--muted:#7A7A7A;--border:#E8E0D8;--paid:#2D6A4F;--paid-bg:#D8F3DC;--terc:#5B5EA6;--wa:#25D366}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);max-width:500px;margin:0 auto;min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;padding-top:env(safe-area-inset-top)}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none}
input,select,textarea{font-family:inherit;-webkit-appearance:none}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:12px 28px;border-radius:30px;font-size:15px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap;transition:opacity .3s;pointer-events:none}
.toast.hidden{opacity:0}
.header{background:linear-gradient(135deg,#1B4332,#2D6A4F);padding:22px 20px 16px;border-radius:0 0 24px 24px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.06)}
.h-title{font-size:22px;font-weight:800;color:#fff;letter-spacing:1px}
.h-sub{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:12px}
.h-date-row{display:flex;align-items:center;justify-content:center;gap:6px}
.h-date-sel{background:rgba(255,255,255,.18);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:15px;padding:7px 10px;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer}
.h-date-sel option{background:#1B4332;color:#fff}
.tabs{display:flex;gap:5px;padding:14px 16px 6px}
.tab{flex:1;padding:11px 0;border:none;border-radius:12px;font-size:13px;font-weight:700;background:#fff;color:#7A7A7A;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:all .2s}
.tab.active{background:var(--dark);color:#fff;box-shadow:0 2px 8px rgba(27,67,50,.3)}
.content{padding:8px 16px 30px}
.legend{display:flex;gap:14px;justify-content:center;margin-bottom:14px;font-size:14px;color:var(--muted)}
.legend span{display:flex;align-items:center;gap:5px}
.dot{width:11px;height:11px;border-radius:50%;display:inline-block}
.grand{background:linear-gradient(135deg,#1B4332,#2D6A4F);border-radius:18px;padding:20px;text-align:center;margin-bottom:20px}
.grand-label{font-size:12px;color:rgba(255,255,255,.6);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.grand-val{font-size:32px;font-weight:800;color:#fff;margin:4px 0}
.grand-sub{display:flex;justify-content:center;gap:8px;font-size:14px;color:rgba(255,255,255,.7)}
.grand-sub b{font-weight:700;color:#fff}
.sec-title{font-size:18px;font-weight:700;color:var(--dark);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.sec-title.terc{color:var(--terc)}
.card{background:#fff;border-radius:18px;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border)}
.card.terc{border-color:#D5D6E8}
.card-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-name{font-weight:700;font-size:18px;color:var(--dark)}
.card.terc .card-name{color:var(--terc)}
.card-ref{font-size:13px;color:var(--muted);margin-top:1px}
.share-btn{background:#25D366;border:none;border-radius:12px;padding:10px 14px;font-size:18px}
.loan{padding:14px 16px}
.loan+.loan{border-top:1px dashed var(--border)}
.loan-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.loan-lbl{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.loan-amt{font-weight:700;font-size:17px;color:var(--text);margin-top:2px}
.loan-det{font-size:14px;color:var(--muted);margin-top:1px}
.loan-pend{text-align:right}
.loan-pend-lbl{font-size:12px;font-weight:600;color:var(--muted)}
.loan-pend-val{font-weight:700;font-size:17px;color:var(--warm)}
.timeline{display:flex;gap:5px}
.cuota{flex:1;border-radius:10px;padding:8px 4px;text-align:center;min-width:0;border:none}
.cuota-paid{background:var(--paid-bg);outline:2px solid var(--paid)}
.cuota-due{background:var(--warm-lt);outline:2.5px solid var(--warm);box-shadow:0 0 0 3px rgba(224,122,58,.15)}
.cuota-future{background:#F5F5F5;outline:2px solid #DEDEDE}
.cuota-month{font-size:12px;font-weight:600;text-transform:uppercase}
.cuota-val{font-size:15px;font-weight:700;margin-top:2px}
.cuota-status{font-size:11px;font-weight:700;margin-top:3px}
.cuota-paid .cuota-month,.cuota-paid .cuota-val{color:var(--paid)}
.cuota-paid .cuota-status{color:var(--dark)}
.cuota-due .cuota-month,.cuota-due .cuota-val,.cuota-due .cuota-status{color:var(--warm)}
.cuota-future .cuota-month,.cuota-future .cuota-val,.cuota-future .cuota-status{color:#AAA}
.total-ban{background:var(--warm);padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.total-ban-lbl{font-size:14px;color:rgba(255,255,255,.9);font-weight:600}
.total-ban-val{font-size:24px;font-weight:800;color:#fff}
.note{text-align:center;font-size:13px;color:var(--muted);padding:10px 12px;background:#fff;border-radius:12px;border:1px solid var(--border)}
.note b{color:var(--dark)}
.btn-pdf{width:100%;padding:16px;border:none;border-radius:14px;background:#25D366;color:#fff;font-size:16px;font-weight:700;margin-top:16px}
.btn-pdf:disabled{opacity:.6}
.btn-pdf-note{text-align:center;font-size:12px;color:#999;margin:6px 0 0}
.btn-txt{width:100%;padding:16px;border:none;border-radius:14px;background:var(--dark);color:#fff;font-size:15px;font-weight:700;margin-top:10px}
.add-btn{width:100%;padding:14px;border:2px dashed var(--accent);border-radius:14px;background:transparent;color:var(--accent);font-size:15px;font-weight:700;margin-bottom:12px}
.add-btn.terc{border-color:var(--terc);color:var(--terc)}
.mg-card{background:#fff;border-radius:16px;margin-bottom:12px;padding:16px;border:1px solid var(--border)}
.mg-loan{background:#F9F9F7;border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid #EEEBE6}
.del-btn{background:#FEE2E2;border:none;border-radius:10px;padding:8px 12px;color:#DC2626;font-size:14px;font-weight:600}
.add-loan-btn{width:100%;padding:10px;border:1px dashed #ccc;border-radius:10px;background:transparent;color:var(--muted);font-size:13px;margin-top:4px}
.reset-btn{width:100%;padding:14px;border:2px solid #DC2626;border-radius:14px;background:transparent;color:#DC2626;font-size:15px;font-weight:700;margin-top:8px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:998;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:4px;margin:0 auto 20px}
.modal-title{font-size:19px;font-weight:700;margin-bottom:20px;color:var(--dark)}
.m-input{width:100%;padding:14px;border-radius:12px;border:2px solid var(--border);font-size:16px;margin-bottom:12px;outline:none;box-sizing:border-box}
.m-select{width:100%;padding:12px;border-radius:12px;border:2px solid var(--border);font-size:15px;outline:none}
.m-label{font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px}
.m-opt{flex:1;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:700}
.m-opt.active{background:var(--dark);color:#fff}
.m-opt:not(.active){background:#F5F5F5;color:#777}
.m-primary{width:100%;padding:16px;border:none;border-radius:14px;background:var(--accent);color:#fff;font-size:16px;font-weight:700}
.m-summary{background:var(--bg);border-radius:14px;padding:14px;margin-bottom:16px}
.send-header{background:linear-gradient(135deg,#1a472a,#25855a);border-radius:16px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.send-header-left .send-title{font-size:16px;font-weight:800;color:#fff}
.send-header-left .send-sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:2px}
.send-counter{background:rgba(255,255,255,.2);border-radius:20px;padding:6px 14px;color:#fff;font-weight:700;font-size:14px}
.send-controls{display:flex;gap:8px;margin-bottom:10px}
.send-ctrl-btn{flex:1;padding:11px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer}
.select-all-btn{background:var(--dark);color:#fff}
.select-none-btn{background:#fff;color:var(--dark);border:2px solid var(--dark)}
.send-filter{display:flex;gap:6px;margin-bottom:10px}
.send-filter-btn{flex:1;padding:9px 6px;border:2px solid transparent;border-radius:10px;font-size:12px;font-weight:700;background:#fff;color:#999;transition:all .15s}
.send-filter-btn.on{background:var(--dark);color:#fff;border-color:var(--dark)}
.send-filter-btn.terc-on{background:var(--terc);color:#fff;border-color:var(--terc)}
.send-search{width:100%;padding:11px 14px;border-radius:12px;border:2px solid var(--border);font-size:15px;outline:none;margin-bottom:10px;box-sizing:border-box;background:#fff}
.send-search:focus{border-color:var(--accent)}
.send-card{background:#fff;border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);border:2px solid transparent;transition:all .2s}
.send-card.selected{border-color:var(--accent);background:#F0FBF4}
.send-card.terc-selected{border-color:var(--terc);background:#F3F3FB}
.send-card.no-cuota-this-month{opacity:.7}
.send-card-head{padding:14px 14px 10px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.send-card-info{flex:1;min-width:0}
.send-card-check{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;border:2px solid #ddd;background:#fff;font-size:14px;flex-shrink:0;transition:all .15s;margin-top:2px}
.send-card.selected .send-card-check{background:var(--accent);border-color:var(--accent);color:#fff}
.send-card.terc-selected .send-card-check{background:var(--terc);border-color:var(--terc);color:#fff}
.send-card-name{font-weight:700;font-size:16px;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.send-card.terc-selected .send-card-name{color:var(--terc)}
.send-card-meta{font-size:12px;color:var(--muted);margin-top:2px}
.send-amt-wrap{text-align:right;flex-shrink:0}
.send-amt-this{font-size:18px;font-weight:800;color:var(--warm)}
.send-amt-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.send-amt-none{font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.5px}
.send-amt-future{font-size:11px;color:var(--muted);margin-top:2px}
.send-card-bottom{padding:0 14px 12px;display:flex;gap:6px}
.copy-btn{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:700;background:var(--dark);color:#fff;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.copy-btn:active{transform:scale(.97)}
.copy-btn.copied{background:var(--accent)}
.copy-btn.terc-type{background:var(--terc)}
.copy-btn.terc-type.copied{background:#3D4080}
.preview-btn{padding:10px 12px;border:2px solid var(--border);border-radius:10px;background:#fff;color:var(--muted);font-size:13px;font-weight:700}
.send-section-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px;padding:0 2px}
.send-batch-bar{position:sticky;bottom:16px;z-index:10;margin-top:10px}
.send-batch-btn{width:100%;padding:17px;border:none;border-radius:16px;background:var(--wa);color:#fff;font-size:16px;font-weight:700;box-shadow:0 4px 20px rgba(37,211,102,.4);display:flex;align-items:center;justify-content:center;gap:8px}
.send-batch-btn:disabled{opacity:.5;box-shadow:none}
.send-group-btn{width:100%;padding:14px;border:none;border-radius:16px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.send-batch-info{text-align:center;font-size:12px;color:var(--muted);margin-top:8px}
.preview-text{background:#F5F0EB;border-radius:12px;padding:14px;font-size:13px;font-family:monospace;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto;border:1px solid var(--border);color:#333;margin-bottom:16px}
.copy-full-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--wa);color:#fff;font-size:15px;font-weight:700}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:15px;font-weight:600}
.empty-sub{font-size:13px;margin-top:6px}
.resumen-final{background:linear-gradient(135deg,#1B4332,#2D6A4F);border-radius:18px;padding:18px;margin-top:16px}
.rf-title{font-size:14px;font-weight:800;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.rf-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px;color:rgba(255,255,255,.8)}
.rf-val{font-weight:700;color:#fff}
.rf-pend{color:#FFB347}
.rf-divider{height:1px;background:rgba(255,255,255,.15);margin:10px 0}
.rf-total{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:2px solid rgba(255,255,255,.25);font-size:18px;font-weight:800;color:#fff}
.img-btn{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:700;background:#FF6B35;color:#fff;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.img-btn:active{transform:scale(.97)}
.img-btn:disabled{opacity:.5}
.link-btn{padding:10px 12px;border:2px solid var(--accent);border-radius:10px;background:#fff;color:var(--accent);font-size:13px;font-weight:700;white-space:nowrap}
.link-btn.terc-type{border-color:var(--terc);color:var(--terc)}
.readonly-banner{background:linear-gradient(135deg,#5B5EA6,#3D4080);padding:16px 20px;text-align:center}
.link-modal-url{background:#F5F0EB;border-radius:12px;padding:14px;font-size:13px;font-family:monospace;word-break:break-all;border:1px solid var(--border);color:#333;margin-bottom:14px;line-height:1.5}
.link-copy-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--dark);color:#fff;font-size:15px;font-weight:700;margin-bottom:10px}
.link-wa-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--wa);color:#fff;font-size:15px;font-weight:700}
.cfg-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.cfg-row:last-child{border-bottom:none}
.cfg-label{font-size:15px;font-weight:600;color:var(--dark)}
.cfg-sub{font-size:12px;color:var(--muted);margin-top:2px}
.cfg-input{width:90px;padding:8px 10px;border-radius:10px;border:2px solid var(--border);font-size:15px;font-weight:700;text-align:center;outline:none}
.cfg-input:focus{border-color:var(--accent)}
.backup-btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:700;margin-bottom:10px}
.backup-export{background:var(--dark);color:#fff}
.backup-import{background:#fff;color:var(--dark);border:2px solid var(--dark)}
.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.sync-ok{background:#25D366}
.sync-err{background:#E07A3A}
.sync-ing{background:#FFD600;animation:pulse .8s infinite alternate;will-change:opacity}
@keyframes pulse{from{opacity:1}to{opacity:.3}}

.hist-badge{position:absolute;top:14px;right:14px;background:var(--accent);color:#fff;border-radius:10px;padding:4px 10px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px}
.hist-badge .hist-num{font-size:16px;font-weight:900}
.member-info{display:flex;gap:8px;font-size:12px;color:var(--muted);margin-top:6px;flex-wrap:wrap}
.member-info span{display:flex;align-items:center;gap:3px}
.card-head{position:relative}
.hist-modal-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.hist-modal-item:last-child{border-bottom:none}
.hist-modal-date{font-size:14px;font-weight:600;color:var(--dark)}
.hist-modal-amt{font-size:16px;font-weight:700;color:var(--accent)}
.hist-total{background:var(--bg);border-radius:12px;padding:14px;margin-top:12px;display:flex;justify-content:space-between;align-items:center}
.hist-total-lbl{font-size:14px;font-weight:600;color:var(--muted)}
.hist-total-val{font-size:20px;font-weight:800;color:var(--dark)}
.app-version{position:fixed;bottom:6px;right:8px;font-size:10px;color:var(--muted);opacity:.5;z-index:100;pointer-events:none;font-weight:600}
.update-banner{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#E07A3A,#D96926);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,.2);z-index:9998;transform:translateY(100%);transition:transform .3s ease-out;padding-bottom:calc(14px + env(safe-area-inset-bottom))}
.update-banner.show{transform:translateY(0)}
.update-banner-text{flex:1;font-size:14px;font-weight:600;line-height:1.3}
.update-banner-text small{display:block;font-size:11px;opacity:.85;font-weight:500;margin-top:2px}
.update-banner-btn{background:#fff;color:#D96926;border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap}
.update-banner-close{background:rgba(255,255,255,.2);border:none;border-radius:8px;color:#fff;width:32px;height:32px;font-size:18px;font-weight:700;cursor:pointer;flex-shrink:0}
</style>
</head>
<body>
<div id="toast" class="toast hidden"></div>
<div id="app"></div>

<!-- Banner de nueva versión disponible -->
<div id="updateBanner" class="update-banner">
  <div class="update-banner-text">
    Nueva versión disponible
    <small>Toca actualizar para cargar los últimos cambios</small>
  </div>
  <button class="update-banner-btn" onclick="APP_UPDATE.apply()">Actualizar</button>
  <button class="update-banner-close" onclick="APP_UPDATE.dismiss()" aria-label="Cerrar">×</button>
</div>

<!-- Marca de versión visible -->
<div class="app-version" id="appVersionTag">v13.0</div>

<!-- FIX IPHONE: html2canvas y jsPDF se cargan LAZY, solo cuando el usuario pulsa "Generar PDF" -->
<!-- Ya NO se cargan al inicio — esto reducía la memoria disponible desde el principio -->

<!-- Firebase compat (funciona con archivos locales en Safari/iPhone) -->
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
<script>
function initFirebase(){
  if(typeof firebase==="undefined"){

// Migration: merge INITIAL metadata into existing DATA without losing payment states
function migrateData(data){
  if(!data||!data.members)return data;
  if(data._version>=DATA_VERSION)return data; // already up to date
  
  const initialMap={};
  INITIAL.members.forEach(m=>{initialMap[m.name.toLowerCase()]=m;});
  
  // Update existing members with new fields
  data.members.forEach(m=>{
    const ref=initialMap[m.name.toLowerCase()];
    if(ref){
      if(!m.joinMonth&&ref.joinMonth){m.joinMonth=ref.joinMonth;m.joinYear=ref.joinYear;}
      if(!m.history||m.history.length===0){m.history=JSON.parse(JSON.stringify(ref.history||[]));}
      if(!m.phone)m.phone="";
    }
    if(!m.history)m.history=[];
    if(!m.joinMonth)m.joinMonth=null;
    if(!m.joinYear)m.joinYear=null;
  });
  
  // Add members that exist in INITIAL but not in saved data
  const existingNames=new Set(data.members.map(m=>m.name.toLowerCase()));
  INITIAL.members.forEach(im=>{
    if(!existingNames.has(im.name.toLowerCase())){
      data.members.push(JSON.parse(JSON.stringify(im)));
    }
  });
  
  // Update report month/year
  data.reportMonth=INITIAL.reportMonth;
  data.reportYear=INITIAL.reportYear;
  data._version=DATA_VERSION;
  return data;
}

// Detecta el mes y año actuales del sistema y los aplica como reporte
function setCurrentMonthYear(){
  if(!DATA)return;
  const now=new Date();
  const curM=MONTHS[now.getMonth()];
  const curY=now.getFullYear();
  if(YEARS.indexOf(curY)===-1)YEARS.push(curY);
  DATA.reportMonth=curM;
  DATA.reportYear=curY;
}

// Devuelve la cuota "activa" de una ayuda en el mes-año dado.
// Lógica:
//  1) Si hay alguna cuota anterior al mes actual sin pagar (atraso), devolver la más antigua.
//  2) Si no hay atrasos y la cuota del mes actual existe y no está pagada, devolverla.
//  3) Si no hay atrasos y la cuota del mes actual está pagada (o no existe),
//     devolver la siguiente cuota futura no pagada (cascada).
function activePayIndex(loan,rm,ry){
  const ri=MONTHS.indexOf(rm);
  // 1) Buscar atraso más antiguo (cuotas estrictamente anteriores al mes actual)
  for(let i=0;i<loan.pays.length;i++){
    const p=loan.pays[i];
    if(p.paid)continue;
    const pi=MONTHS.indexOf(p.m);
    const isBefore=(p.y<ry)||(p.y===ry&&pi<ri);
    if(isBefore)return i;
  }
  // 2) ¿Hay cuota del mes actual sin pagar?
  for(let i=0;i<loan.pays.length;i++){
    const p=loan.pays[i];
    if(p.m===rm&&p.y===ry&&!p.paid)return i;
  }
  // 3) Cascada: primera cuota futura sin pagar
  for(let i=0;i<loan.pays.length;i++){
    if(!loan.pays[i].paid)return i;
  }
  return -1;
}

// Construye el orden de la lista única en pantalla principal:
// 1) Asociados con ayudas activas (con sus terceros referidos justo debajo)
// 2) Asociados sin ayudas activas (con sus terceros referidos justo debajo)
// 3) Terceros huérfanos (sin asociado avalista que coincida) al final
function buildOrderedMembers(){
  const asoc=DATA.members.filter(m=>m.type==="asociado");
  const terc=DATA.members.filter(m=>m.type==="tercero");
  const tercByRef={};
  const asocNames=new Set(asoc.map(a=>a.name.toLowerCase()));
  terc.forEach(t=>{
    const refKey=(t.ref||"").toLowerCase();
    if(refKey&&asocNames.has(refKey)){
      if(!tercByRef[refKey])tercByRef[refKey]=[];
      tercByRef[refKey].push(t);
    }
  });
  const orphanTerc=terc.filter(t=>{
    const refKey=(t.ref||"").toLowerCase();
    return !refKey||!asocNames.has(refKey);
  });
  const hasActive=m=>m.loans.some(l=>l.pays.some(p=>!p.paid));
  const withActive=asoc.filter(hasActive);
  const withoutActive=asoc.filter(m=>!hasActive(m));
  const result=[];
  withActive.forEach(a=>{
    result.push(a);
    const refs=tercByRef[a.name.toLowerCase()]||[];
    refs.forEach(t=>result.push(t));
  });
  withoutActive.forEach(a=>{
    result.push(a);
    const refs=tercByRef[a.name.toLowerCase()]||[];
    refs.forEach(t=>result.push(t));
  });
  // Huérfanos al final: primero los que tienen ayudas activas, luego los demás
  orphanTerc.filter(hasActive).forEach(t=>result.push(t));
  orphanTerc.filter(t=>!hasActive(t)).forEach(t=>result.push(t));
  return result;
}

function mergeTerceroIntoAsociado(name,joinMonth,joinYear){
  const key=name.toLowerCase().trim();
  const tercero=DATA.members.find(m=>m.type==="tercero"&&m.name.toLowerCase().trim()===key);
  if(!tercero)return false;
  tercero.type="asociado";
  tercero.ref=null;
  tercero.joinMonth=joinMonth||DATA.reportMonth;
  tercero.joinYear=joinYear||DATA.reportYear;
  if(!tercero.history)tercero.history=[];
  if(!tercero.phone)tercero.phone="";
  return true;
}


function memberMonths(m){
  if(!m.joinMonth||!m.joinYear)return 0;
  const ji=MONTHS.indexOf(m.joinMonth),jy=m.joinYear;
  const ri=MONTHS.indexOf(DATA.reportMonth),ry=DATA.reportYear;
  return (ry-jy)*12+(ri-ji)+1;
}
function memberTotalAportes(m){
  if(!m.joinMonth)return 0;
  return memberMonths(m)*DATA.monthlyFee;
}

}

let SYNC_STATUS="init";

function load(){
  if(READONLY_ID||GRUPO_IDS){
    DATA=JSON.parse(JSON.stringify(INITIAL));
    document.getElementById("app").innerHTML='<div style="text-align:center;padding:60px 20px"><div style="font-size:40px;margin-bottom:12px">⏳</div><div style="font-size:16px;font-weight:600;color:#2D6A4F">Cargando datos...</div></div>';
    const tryLoad=async()=>{
      if(!window._fbReady){
        await new Promise(res=>{
          const t=setTimeout(res,7000);
          window.addEventListener("firebase-ready",()=>{clearTimeout(t);res();},{once:true});
        });
      }
      try{
        const fbData=await window._fbLoad();
        if(fbData){DATA=migrateData(fbData);if(DATA.members)DATA.members.forEach(m=>{if(!m.phone)m.phone="";if(!m.history)m.history=[];if(!m.joinMonth)m.joinMonth=null;if(!m.joinYear)m.joinYear=null;});}
        SYNC_STATUS="ok";
      }catch(e){console.error("Firebase readonly load failed:",e);SYNC_STATUS="error";}
      setCurrentMonthYear();
      render();
    };
    tryLoad();
    return;
  }

  // Modo administrador: localStorage primero (inmediato), Firebase después (en background)
  try{
    const s=localStorage.getItem(KEY);
    DATA=s?migrateData(JSON.parse(s)):JSON.parse(JSON.stringify(INITIAL));
    if(DATA.members)DATA.members.forEach(m=>{if(!m.phone)m.phone="";if(!m.history)m.history=[];if(!m.joinMonth)m.joinMonth=null;if(!m.joinYear)m.joinYear=null;});
  }catch{DATA=JSON.parse(JSON.stringify(INITIAL));}
  // Forzar siempre al mes actual al cargar
  setCurrentMonthYear();
  SYNC_STATUS="init";
  render(); // Renderizar con datos locales inmediatamente

  // FIX IPHONE: sincronizar con Firebase UNA SOLA VEZ al cargar
  // Sin onSnapshot — sin WebSocket persistente — sin congelados
  const tryFirebase=async()=>{
    if(!window._fbReady){
      await new Promise(res=>{
        const t=setTimeout(res,5000);
        window.addEventListener("firebase-ready",()=>{clearTimeout(t);res();},{once:true});
      });
    }
    try{
      const fbData=await window._fbLoad();
      if(fbData){
        DATA=migrateData(fbData);
        if(DATA.members)DATA.members.forEach(m=>{if(!m.phone)m.phone="";if(!m.history)m.history=[];if(!m.joinMonth)m.joinMonth=null;if(!m.joinYear)m.joinYear=null;});
        localStorage.setItem(KEY,JSON.stringify(DATA));
      }
      SYNC_STATUS="ok";
    }catch(e){
      console.error("Firebase load failed:",e);
      SYNC_STATUS="error";
    }
    setCurrentMonthYear();
    render();
    // FIX IPHONE: NO llamamos a _fbListen aquí — eliminado completamente
  };
  tryFirebase();
}

async function save(){
  try{localStorage.setItem(KEY,JSON.stringify(DATA));}catch{}

  if(!READONLY_ID&&!GRUPO_IDS){
    SYNC_STATUS="saving";
    // FIX IPHONE: actualizar solo el indicador, sin re-renderizar todo
    const dot=document.querySelector(".sync-indicator");
    if(dot)dot.innerHTML=syncHTML();

    try{
      if(window._fbReady){
        const ok=await window._fbSave(DATA);
        SYNC_STATUS=ok?"ok":"error";
      }else{
        SYNC_STATUS="offline";
      }
    }catch{SYNC_STATUS="error";}

    // Actualizar solo el indicador de sync, no todo el render
    const dot2=document.querySelector(".sync-indicator");
    if(dot2)dot2.innerHTML=syncHTML();
  }
}

function syncHTML(){
  if(SYNC_STATUS==="ok")return'<span class="sync-dot sync-ok"></span>Sincronizado';
  if(SYNC_STATUS==="saving")return'<span class="sync-dot sync-ing"></span>Guardando...';
  if(SYNC_STATUS==="error")return'<span class="sync-dot sync-err"></span>Sin conexión — guardado local';
  if(SYNC_STATUS==="offline")return'<span class="sync-dot sync-err"></span>Offline — guardado local';
  return'<span class="sync-dot sync-ing"></span>Conectando...';
}

function toast(msg,dur=2500){const t=document.getElementById("toast");t.textContent=msg;t.classList.remove("hidden");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add("hidden"),dur);}

function due(m,rm,ry){
  let t=0;
  m.loans.forEach(l=>{
    const idx=activePayIndex(l,rm,ry);
    if(idx>=0)t+=l.inst;
  });
  return t;
}
function pendLoan(l){return l.pays.filter(p=>!p.paid).length*l.inst;}
function pendAll(m){let t=0;m.loans.forEach(l=>t+=pendLoan(l));return t;}

function togglePay(mid,lid,pi){
  UNDO_SNAPSHOT=JSON.stringify(DATA);
  clearTimeout(UNDO_TIMER);

  let loanCompleted=false;
  DATA.members.forEach(m=>{
    if(m.id===mid){
      m.loans.forEach(l=>{if(l.id===lid)l.pays[pi].paid=!l.pays[pi].paid;});
      const before=m.loans.length;
      m.loans=m.loans.filter(l=>l.pays.some(p=>!p.paid));
      if(m.loans.length<before)loanCompleted=true;
    }
  });
  save();

  const msg=loanCompleted?"✅ Ayuda completada y archivada":"Pago actualizado ✓";
  const t=document.getElementById("toast");
  t.innerHTML=`${msg} &nbsp;<span onclick="undoPay()" style="text-decoration:underline;cursor:pointer;font-weight:800">↩ Deshacer</span>`;
  t.classList.remove("hidden");
  clearTimeout(t._t);
  UNDO_TIMER=setTimeout(()=>{t.classList.add("hidden");UNDO_SNAPSHOT=null;},6000);

  render();
}

function undoPay(){
  if(!UNDO_SNAPSHOT)return;
  DATA=JSON.parse(UNDO_SNAPSHOT);
  UNDO_SNAPSHOT=null;
  clearTimeout(UNDO_TIMER);
  save();
  toast("↩ Pago deshecho ✓");
  render();
}

function mText(member){
  const{reportMonth:rm,reportYear:ry,monthlyFee:fee}=DATA;
  let t=`━━━━━━━━━━━━━━━━━━━━\n📋 *NUEVOS HORIZONTES*\nReporte ${rm} ${ry}\n━━━━━━━━━━━━━━━━━━━━\n\n👤 *${member.name}*\n`;
  if(member.ref)t+=`   Referido por: ${member.ref}\n`;
  t+=`\n`;
  member.loans.forEach(loan=>{
    t+=`📌 *Ayuda otorgada ${loan.gMonth} ${loan.gYear}*\n   Capital: ${loan.capital} € · Total: ${loan.total} €\n   Pendiente: ${pendLoan(loan)} €\n\n`;
    loan.pays.forEach(p=>{
      const cur=p.m===rm&&p.y===ry;
      if(p.paid)t+=`   ✅ ${p.m} ${p.y}: ${loan.inst} € (pagado)\n`;

}

// FIX IPHONE: html2canvas y jsPDF se cargan LAZY aquí, solo cuando se necesitan
async function loadPDFLibs(){
  if(window.html2canvas&&window.jspdf)return true;
  return new Promise((resolve)=>{
    const s1=document.createElement("script");
    s1.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
    s1.onload=()=>{
      const s2=document.createElement("script");
      s2.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
      s2.onload=()=>resolve(true);
      s2.onerror=()=>resolve(false);
      document.head.appendChild(s2);
    };
    s1.onerror=()=>resolve(false);
    document.head.appendChild(s1);
  });
}

async function sharePDF(){
  if(BUSY)return;
  BUSY=true;render();
  toast("⏳ Cargando librerías PDF...",4000);

  const loaded=await loadPDFLibs();
  if(!loaded){toast("Error al cargar PDF. Comprueba tu conexión.");BUSY=false;render();return;}

  toast("📄 Generando PDF...",4000);
  try{
    const el=document.getElementById("capture");
    const canvas=await html2canvas(el,{backgroundColor:"#F5F0EB",scale:2,useCORS:true,logging:false});
    const{jsPDF}=window.jspdf;
    const imgData=canvas.toDataURL("image/jpeg",.92);
    const pW=100,pH=170,ratio=pW/canvas.width,totalH=canvas.height*ratio,pages=Math.ceil(totalH/pH);
    const pdf=new jsPDF({unit:"mm",format:[pW,pH]});
    for(let i=0;i<pages;i++){if(i>0)pdf.addPage([pW,pH]);pdf.addImage(imgData,"JPEG",0,-i*pH,pW,totalH);}
    const blob=pdf.output("blob");
    const file=new File([blob],`Reporte_${DATA.reportMonth}_${DATA.reportYear}.pdf`,{type:"application/pdf"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({files:[file],title:"Reporte NH"});toast("Compartido ✓");BUSY=false;render();return;}catch(e){if(e.name==="AbortError"){BUSY=false;render();return;}}
    }
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=file.name;a.click();URL.revokeObjectURL(url);toast("PDF descargado ✓");
  }catch(err){console.error(err);toast("Error al generar PDF");}
  BUSY=false;render();
}

function addMemberSubmit(){
  const name=document.getElementById("m-name").value.trim();if(!name)return;
  const type=document.querySelector(".m-opt.active")?.dataset.type||"asociado";
  const ref=type==="tercero"?(document.getElementById("m-ref")?.value.trim()||null):null;
  // Si se añade un ASOCIADO y existe un TERCERO con el mismo nombre, fusionar
  if(type==="asociado"){
    const key=name.toLowerCase().trim();
    const tercExist=DATA.members.find(x=>x.type==="tercero"&&x.name.toLowerCase().trim()===key);
    if(tercExist){
      if(confirm(`Ya existe un tercero con el nombre "${tercExist.name}".\n\n¿Convertirlo en asociado conservando todo su historial y ayudas activas?`)){
        const ok=mergeTerceroIntoAsociado(name,DATA.reportMonth,DATA.reportYear);
        if(ok){closeModal();save();toast("✓ Tercero convertido a asociado");return;}
      }else{
        return; // El admin canceló — no crear duplicado
      }
    }
  }
  DATA.members.push({id:"m"+Date.now(),name,type,ref,joinMonth:type==="asociado"?DATA.reportMonth:null,joinYear:type==="asociado"?DATA.reportYear:null,history:[],loans:[],phone:""});
  closeModal();save();toast("Miembro añadido ✓");
}

function addLoanSubmit(){
  const cap=parseInt(document.getElementById("l-cap").value)||0;if(cap<=0)return;
  const nn=parseInt(document.querySelector(".l-n-opt.active")?.dataset.n||"3");
  const gm=document.getElementById("l-gm").value,gy=parseInt(document.getElementById("l-gy").value);
  const sm=document.getElementById("l-sm").value,sy=parseInt(document.getElementById("l-sy").value);
  const total=cap+cap*(DATA.rate/100)*nn,inst=Math.ceil(total/nn);
  const pays=[];let mi=MONTHS.indexOf(sm),yr=sy;
  for(let i=0;i<nn;i++){pays.push({m:MONTHS[mi],y:yr,paid:false});mi++;if(mi>=12){mi=0;yr++;}}
  DATA.members.forEach(m=>{if(m.id===MODAL.mid){m.loans.push({id:"l"+Date.now(),gMonth:gm,gYear:gy,capital:cap,total,n:nn,inst,pays});if(!m.history)m.history=[];m.history.push({gMonth:gm,gYear:gy,capital:cap});}});
  closeModal();save();toast("Ayuda añadida ✓");
}

function saveCfg(){
  const fee=parseInt(document.getElementById("cfg-fee")?.value)||50;
  const rate=parseFloat(document.getElementById("cfg-rate")?.value)||5;
  DATA.monthlyFee=fee;DATA.rate=rate;
  save();toast("Configuración guardada ✓");
}

function exportData(){
  const json=JSON.stringify(DATA,null,2);
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`NH_backup_${DATA.reportMonth}${DATA.reportYear}.json`;a.click();URL.revokeObjectURL(url);
  toast("💾 Backup exportado ✓");
}
function importData(){
  const input=document.createElement("input");input.type="file";input.accept=".json,application/json";
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(!parsed.members||!Array.isArray(parsed.members))throw new Error("Formato inválido");
        if(!confirm(`¿Importar backup? Esto reemplazará todos los datos actuales.\n\nSocios en el backup: ${parsed.members.length}`))return;
        DATA=parsed;
        save();toast("📂 Datos importados ✓");render();
      }catch(err){toast("Error al importar: "+err.message);}
    };
    reader.readAsText(file);
  };
  input.click();
}

    h+=`<div class="sec-title">📌 Con ayudas activas</div>`;
    if(activos.length){
      activos.forEach(m=>{h+=cardHTML(m,m.type==="tercero");});
    }else{

    }
    if(inactivos.length){

      inactivos.forEach(m=>{h+=cardHTML(m,m.type==="tercero");});
    }
    h+=`<div class="note">Recuerda: el aporte mensual de <b>${fee},00 €</b> es adicional a las cuotas de devolución.</div>`;
    const nuevasInt=DATA.members.filter(m=>m.type==="asociado").reduce((s,m)=>s+m.loans.filter(l=>l.gMonth===rm&&l.gYear===ry).reduce((a,l)=>a+l.capital,0),0);

    const totIntPend=DATA.members.filter(m=>m.type==="asociado").reduce((s,m)=>s+pendAll(m),0);
    const totTercPend=DATA.members.filter(m=>m.type==="tercero").reduce((s,m)=>s+pendAll(m),0);

    h+=`<div class="send-filter">
      <button class="send-filter-btn ${SEND_FILTER==="all"?"on":""}" onclick="SEND_FILTER='all';render()">Todos (${allPending.length})</button>

function sendCardHTML(m,rm,ry,dimmed){
  const dMes=due(m,rm,ry);
  const dTot=pendAll(m);
  const isTerc=m.type==="tercero";
  const isSel=SEND_SELECTED.has(m.id);
  const selClass=isSel?(isTerc?"terc-selected":"selected"):"";
  const btnId=`copy-${m.id}`;
  return`<div class="send-card ${selClass}${dimmed?" no-cuota-this-month":""}" onclick="toggleSendSelect('${esc(m.id)}')">
    <div class="send-card-head">
      <div class="send-card-info">
        <div class="send-card-name">${escH(m.name)}</div>
        <div class="send-card-meta">${isTerc?"🤝 ref: "+escH(m.ref):"👥 Asociado"} · ${m.loans.length} ayuda${m.loans.length>1?"s":""}</div>
      </div>
      <div class="send-amt-wrap">
        ${dMes>0
          ?`<div class="send-amt-this">${dMes} €</div><div class="send-amt-label">este mes</div>`
          :`<div class="send-amt-none">sin cuota<br>en ${rm}</div>`
        }
        ${dTot>dMes?`<div class="send-amt-future">Pend. total: ${dTot} €</div>`:""}
      </div>
      <div class="send-card-check">${isSel?"✓":""}</div>
    </div>
    <div class="send-card-bottom">
      <button id="${btnId}" class="copy-btn ${isTerc?"terc-type":""}" onclick="event.stopPropagation();copyText(mText(DATA.members.find(x=>x.id==='${esc(m.id)}')),this.id)">📋 Copiar mensaje</button>
      <button class="preview-btn" onclick="event.stopPropagation();openPreview('${esc(m.id)}')">👁️</button>
    </div>
  </div>`;
}

function cardHTML(m,isT){
  const{reportMonth:rm,reportYear:ry}=DATA;
  const d=due(m,rm,ry);
  const hCount=memberHistoryCount(m);
  let h=`<div id="card-capture-${m.id}" style="background:#F5F0EB;padding:4px 0 8px">`;
  h+=`<div class="card ${isT?"terc":""}"><div class="card-head" style="position:relative"><div><div class="card-name">${escH(m.name)}</div>${m.ref?`<div class="card-ref">Referido por ${escH(m.ref)}</div>`:""}`;
  if(m.joinMonth){
    h+=`<div class="member-info"><span>📅 Miembro desde ${MONTHS_FULL[MONTHS.indexOf(m.joinMonth)]} ${m.joinYear}</span></div>`;
  }
  h+=`</div>`;
  // History badge top-right — clickable to open full history
  if(hCount>0){
    h+=`<div class="hist-badge" onclick="event.stopPropagation();openHistory('${esc(m.id)}')" style="cursor:pointer">📋 <span class="hist-num">${hCount}</span> total de ayudas</div>`;
  }else if(!isT){
    h+=`<div class="hist-badge" style="background:#ccc;cursor:default">📋 <span class="hist-num">0</span> ayudas</div>`;
  }
  h+=`</div>`;
  if(m.loans.length===0){
    h+=`<div style="padding:16px;text-align:center;color:var(--muted);font-size:14px">Sin ayudas activas</div>`;
  }
  m.loans.forEach((loan,li)=>{
    const activeIdx=activePayIndex(loan,rm,ry);
    h+=`<div class="loan"${li>0?' style="border-top:1px dashed #E8E0D8"':""}>`;
    h+=`<div class="loan-row"><div><div class="loan-lbl">Ayuda ${loan.gMonth} ${loan.gYear}</div><div class="loan-amt">${loan.capital},00 €</div></div></div>`;
    h+=`<div class="timeline">`;
    loan.pays.forEach((p,pi)=>{
      const isActive=(pi===activeIdx);
      const st=p.paid?"paid":isActive?"due":"future";
      const confirmMsg=!p.paid?`if(!confirm('¿Marcar como pagado: ${loan.inst} € de ${escH(m.name)}?'))return;`:"";
      h+=`<button class="cuota cuota-${st}" onclick="${confirmMsg}togglePay('${esc(m.id)}','${esc(loan.id)}',${pi})"><div class="cuota-month">${p.m}</div><div class="cuota-val">${loan.inst} €</div><div class="cuota-status">${p.paid?"PAGADO":isActive?"POR PAGAR":"—"}</div></button>`;
    });
    h+=`</div></div>`;
  });
  if(m.loans.length>0){
    h+=`<div class="total-ban"><div class="total-ban-lbl">Total ${MONTHS_FULL[MONTHS.indexOf(rm)]}${m.loans.length>1?` (${m.loans.length} ayudas)`:""}</div><div class="total-ban-val">${d} €</div></div>`;
  }
  h+=`</div></div>`;
  h+=`<div style="display:flex;gap:6px;margin:-4px 0 10px">
    <button class="img-btn" onclick="shareImg('${esc(m.id)}')">📸 Imagen</button>
    <button class="link-btn ${isT?"terc-type":""}" onclick="openLinkModal('${esc(m.id)}')">🔗 Enlace</button>
  </div>`;
  return h;
}

function manageHTML(m,isT){
  let h=`<div class="mg-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div><div style="font-weight:700;font-size:16px;color:${isT?"var(--terc)":"var(--dark)"}">${escH(m.name)}</div><div style="font-size:12px;color:var(--muted)">${isT?"Ref: "+escH(m.ref):"Asociado"} · ${m.loans.length} ayuda${m.loans.length>1?"s":""}</div></div><button class="del-btn" onclick="delMember('${esc(m.id)}')">🗑️</button></div>`;

function updateLoanPreview(){
  const cap=parseInt(document.getElementById("l-cap")?.value)||0;
  const nn=parseInt(document.querySelector(".l-n-opt.active")?.dataset.n||"3");
  if(cap<=0){document.getElementById("l-preview").innerHTML="";return;}
  const total=cap+cap*(DATA.rate/100)*nn,inst=Math.ceil(total/nn);
  document.getElementById("l-preview").innerHTML=`<div class="m-summary"><div style="font-size:13px;color:var(--muted);margin-bottom:4px">Resumen</div><div style="display:flex;justify-content:space-between;font-size:15px;margin-top:4px"><span>Capital + interés (${DATA.rate}% × ${nn})</span><span style="font-weight:700">${total} €</span></div><div style="display:flex;justify-content:space-between;font-size:15px;margin-top:4px"><span>Cuota mensual</span><span style="font-weight:700;color:var(--warm)">${inst} €</span></div></div>`;
}

<!-- ============================================================ -->
<!-- DETECTOR DE ACTUALIZACIONES AUTOMÁTICAS                      -->
<!-- ============================================================ -->
<!-- Comprueba cada 2 minutos si hay una versión nueva en GitHub   -->
<!-- Si la detecta, muestra un banner para que Xavy pueda actualizar -->
<!-- Funciona en iPhone como PWA sin necesidad de service worker   -->
<!-- ============================================================ -->
<script>
window.APP_UPDATE = (function(){
  var CHECK_INTERVAL_MS = 2 * 60 * 1000; // Comprueba cada 2 minutos
  var currentFingerprint = null;
  var dismissed = false;
  var banner = document.getElementById('updateBanner');
  var versionTag = document.getElementById('appVersionTag');

  // Obtiene una "huella" del archivo remoto sin descargarlo entero
  // Usa un HEAD request que es muy rápido y no consume datos
  function fetchFingerprint(){
    // Añade un parámetro aleatorio para evitar caché del navegador
    var url = location.href.split('?')[0] + '?_check=' + Date.now();
    return fetch(url, { method: 'HEAD', cache: 'no-store' })
      .then(function(r){
        // La huella es la combinación de ETag + Last-Modified
        // (GitHub Pages cambia estos valores en cada commit nuevo)
        var etag = r.headers.get('ETag') || '';
        var lastMod = r.headers.get('Last-Modified') || '';
        return etag + '|' + lastMod;
      })
      .catch(function(){ return null; });
  }

  function check(){
    if(dismissed) return; // Si el usuario cerró el banner, no insistir esta sesión
    fetchFingerprint().then(function(fp){
      if(!fp) return; // Sin conexión o error, intentar más tarde
      if(currentFingerprint === null){
        // Primera comprobación: guardamos la huella actual
        currentFingerprint = fp;
        return;
      }
      if(fp !== currentFingerprint){
        // ¡Hay una versión nueva!
        showBanner();
      }
    });
  }

  function showBanner(){
    if(banner) banner.classList.add('show');
  }

  function apply(){
    // Recarga forzada desde el servidor, ignorando caché
    location.reload();
  }

  function dismiss(){
    dismissed = true;
    if(banner) banner.classList.remove('show');
  }

  // Inicializar: primera comprobación al cargar
  check();
  // Comprobar cada 2 minutos mientras la app esté abierta
  setInterval(check, CHECK_INTERVAL_MS);
  // Comprobar también cuando el usuario vuelve a la app (importante en iPhone)
  document.addEventListener('visibilitychange', function(){
    if(!document.hidden) check();
  });

  return { apply: apply, dismiss: dismiss };
})();
</script>
